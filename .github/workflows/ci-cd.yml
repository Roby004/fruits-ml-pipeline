name: Fruit AI CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test FastAPI import
        run: |
          python -c "import app; print('API OK')"

      - name: Test model loading
        run: |
          python -c "import joblib; joblib.load('models/fruit_model.pkl'); print('Model OK')"

      - name: Test FastAPI startup
        run: |
          uvicorn app:app &
          sleep 5
          curl http://127.0.0.1:8000/